name: harmony_audio
description: >
  Pacote de dados e assets para o app de música: centraliza músicas
  espirituais (.mp3 hospedadas em repositório próprio) e poesias narradas
  (Internet Archive / LibriVox), com models tipados e um repositório único
  de acesso.
version: 0.1.0
homepage: https://github.com/SEU_USUARIO/harmony_audio

environment:
  sdk: '>=3.0.0 <4.0.0'

# Este pacote é puramente de dados/models. Ele NÃO depende de just_audio
# nem de Flutter — quem reproduz o áudio é o app principal.
dependencies: {}

dev_dependencies:
  lints: ^3.0.0
  test: ^1.24.0
